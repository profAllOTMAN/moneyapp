<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoneyFlow Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.23.0/dist/reset.css" />
    <style>
      :root {
        --bg: #f3f5f9;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --primary: #2563eb;
        --income: #059669;
        --expense: #dc2626;
        --invest: #7c3aed;
        --saving: #0ea5e9;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      .brand { padding: 20px 16px; font-size: 18px; font-weight: 700; letter-spacing: .3px; }
      .header { background: rgba(255,255,255,.82); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
      .content { padding: 20px; }
      .soft-card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); }
      .kpi .ant-statistic-title { color: var(--muted); }
      .kpi.income .ant-statistic-content { color: var(--income); }
      .kpi.expense .ant-statistic-content { color: var(--expense); }
      .kpi.invest .ant-statistic-content { color: var(--invest); }
      .kpi.saving .ant-statistic-content { color: var(--saving); }
      .kpi.balance .ant-statistic-content { color: var(--text); }
      .section-title { margin: 0 0 6px; font-size: 15px; font-weight: 600; }
      .section-sub { margin-bottom: 12px; color: var(--muted); font-size: 12px; }
      .pill { border-radius: 999px; background: var(--surface-soft); border: 1px solid var(--line); padding: 4px 10px; color: var(--muted); font-size: 12px; }
      .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; }
      canvas { max-height: 300px; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/antd@5.23.0/dist/antd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { Layout, Menu, Typography, Card, Row, Col, Table, Tag, Progress, Button, Drawer, Form, Input, InputNumber, DatePicker, Select, Space, Statistic, Tabs, Alert, Divider } = antd;
      const { Header, Sider, Content } = Layout;
      const { Text, Title } = Typography;
      const { TextArea } = Input;

      const STORAGE_KEY = 'moneyflow-live-v3';
      const incomeSources = ['Job', 'Freelance', 'Offline Business', 'Investment Returns'];
      const expenseCategories = ['Food', 'Transport', 'Rent', 'Bills', 'Entertainment', 'Shopping', 'Health', 'Business expenses'];
      const investmentTypes = ['Stock / Inventory', 'Marketing', 'Equipment', 'Operations', 'Expansion'];

      const uid = () => (crypto?.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`);
      const money = (n) => `${Number(n || 0).toLocaleString()} MAD`;
      const sum = (arr, k='amount') => arr.reduce((a,b)=>a+Number(b[k]||0),0);
      const monthKey = (d) => dayjs(d).format('YYYY-MM');

      const seed = {
        incomes: [{ id: uid(), amount: 14500, source: 'Job', date: dayjs().format('YYYY-MM-DD'), description: 'Salary', tag: 'Primary' }],
        expenses: [{ id: uid(), amount: 1300, category: 'Food', date: dayjs().format('YYYY-MM-DD'), paymentMethod: 'Card', notes: 'Groceries' }],
        investments: [{ id: uid(), amount: 2200, businessName: 'Offline Brand', investmentType: 'Marketing', date: dayjs().format('YYYY-MM-DD'), notes: 'Campaign boost' }],
        savingsGoals: [{ id: uid(), name: 'Emergency Fund', targetAmount: 35000, currentAmount: 9500, deadline: dayjs().add(9,'month').format('YYYY-MM-DD') }],
        monthlyPlans: {}
      };

      const load = () => {
        try {
          const loaded = JSON.parse(localStorage.getItem(STORAGE_KEY)) || seed;
          return { ...seed, ...loaded, monthlyPlans: loaded.monthlyPlans || {} };
        } catch { return seed; }
      };

      function ChartCard({ type='pie', labels=[], data=[], title }) {
        const ref = React.useRef(null);
        const hasData = Array.isArray(data) && data.some((value) => Number(value) > 0);

        React.useEffect(() => {
          if (!ref.current || !hasData) return;
          const isPie = type === 'pie';
          const chart = new Chart(ref.current.getContext('2d'), {
            type: isPie ? 'doughnut' : type,
            data: {
              labels,
              datasets: [{
                label: title,
                data,
                borderWidth: isPie ? 2 : 0,
                borderColor: '#ffffff',
                borderRadius: isPie ? 0 : 8,
                hoverOffset: isPie ? 6 : 0,
                backgroundColor: ['#2563eb','#059669','#dc2626','#7c3aed','#0ea5e9','#f59e0b','#ef4444','#14b8a6']
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              cutout: isPie ? '58%' : undefined,
              plugins: {
                legend: { position: 'bottom' },
                tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${money(ctx.raw)}` } }
              },
              scales: isPie ? undefined : { y: { beginAtZero: true, grid: { color: '#e2e8f0' } }, x: { grid: { display: false } } }
            }
          });
          return () => chart.destroy();
        }, [type, hasData, JSON.stringify(labels), JSON.stringify(data), title]);

        if (!hasData) {
          return <div style={{height: 290, display:'grid', placeItems:'center', color:'#64748b'}}>No data yet</div>;
        }

        return <div style={{height: 290}}><canvas ref={ref}></canvas></div>;
      }

      function App() {
        const [page, setPage] = React.useState('dashboard');
        const [db, setDb] = React.useState(load);
        const [drawer, setDrawer] = React.useState({ open: false, type: null, record: null });

        const save = (next) => { setDb(next); localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); };

        const totals = React.useMemo(() => {
          const income = sum(db.incomes), expenses = sum(db.expenses), investments = sum(db.investments), savings = sum(db.savingsGoals,'currentAmount');
          return { income, expenses, investments, savings, balance: income - expenses - investments };
        }, [db]);

        const bySource = incomeSources.map(x=>({ label:x, value:sum(db.incomes.filter(i=>i.source===x)) })).filter(x=>x.value>0);
        const byCategory = expenseCategories.map(x=>({ label:x, value:sum(db.expenses.filter(i=>i.category===x)) })).filter(x=>x.value>0);

        const monthly = React.useMemo(() => {
          const m = new Map();
          [...db.incomes, ...db.expenses, ...db.investments].forEach(t => {
            const k = monthKey(t.date);
            if (!m.has(k)) m.set(k, { month:k, income:0, expense:0, invest:0 });
            const row = m.get(k);
            if (t.source) row.income += Number(t.amount);
            if (t.category) row.expense += Number(t.amount);
            if (t.businessName) row.invest += Number(t.amount);
          });
          return [...m.values()].sort((a,b)=>a.month.localeCompare(b.month));
        }, [db]);

        const insights = React.useMemo(() => {
          const tm = dayjs().format('YYYY-MM');
          const lm = dayjs().subtract(1,'month').format('YYYY-MM');
          const fTm = sum(db.incomes.filter(i=>i.source==='Freelance' && monthKey(i.date)===tm));
          const fLm = sum(db.incomes.filter(i=>i.source==='Freelance' && monthKey(i.date)===lm));
          const foodTm = sum(db.expenses.filter(e=>e.category==='Food' && monthKey(e.date)===tm));
          const foodLm = sum(db.expenses.filter(e=>e.category==='Food' && monthKey(e.date)===lm));
          const invTm = sum(db.investments.filter(i=>monthKey(i.date)===tm));
          const fDelta = fLm ? ((fTm-fLm)/fLm)*100 : 0;
          const foodDelta = foodLm ? ((foodTm-foodLm)/foodLm)*100 : 0;
          return [
            `Freelance income ${fDelta >= 0 ? 'increased' : 'decreased'} ${Math.abs(fDelta).toFixed(1)}% this month.`,
            `You spent ${Math.abs(foodDelta).toFixed(1)}% ${foodDelta >= 0 ? 'more' : 'less'} on food compared to last month.`,
            `You invested ${invTm.toLocaleString()} MAD into your business this month.`
          ];
        }, [db]);

        const keyMap = { income:'incomes', expenses:'expenses', investments:'investments', savings:'savingsGoals' };
        const openDrawer = (type, record=null) => setDrawer({ open: true, type, record });
        const removeRecord = (key, id) => save({ ...db, [key]: db[key].filter(x=>x.id !== id) });

        return (
          <Layout style={{ minHeight: '100vh' }}>
            <Sider theme="light" breakpoint="lg" collapsedWidth="0" style={{ borderRight:'1px solid #e2e8f0' }}>
              <div className="brand">MoneyFlow Pro</div>
              <Menu
                mode="inline"
                selectedKeys={[page]}
                onClick={(e)=>setPage(e.key)}
                items={[
                  { key:'dashboard', label:'Dashboard' }, { key:'income', label:'Income' }, { key:'expenses', label:'Expenses' },
                  { key:'investments', label:'Investments' }, { key:'savings', label:'Savings Goals' }, { key:'reports', label:'Reports' }, { key:'settings', label:'Settings' }
                ]}
              />
            </Sider>

            <Layout>
              <Header className="header">
                <Title level={4} style={{ margin:0 }}>Personal Finance</Title>
                <span className="pill">Modern hierarchy + drawer forms</span>
              </Header>
              <Content className="content">
                {page === 'dashboard' && (
                  <Space direction="vertical" size="large" style={{ width:'100%' }}>
                    <Card className="soft-card" style={{ borderRadius: 16 }}>
                      <div className="section-title">Quick Actions</div>
                      <div className="section-sub">Start with key entries first: income, expense, investment, then savings.</div>
                      <div className="quick-actions">
                        <Button type="primary" onClick={()=>openDrawer('income')}>+ Add Income</Button>
                        <Button danger onClick={()=>openDrawer('expenses')}>+ Add Expense</Button>
                        <Button style={{ background:'#7c3aed', color:'#fff' }} onClick={()=>openDrawer('investments')}>+ Add Investment</Button>
                        <Button style={{ background:'#0ea5e9', color:'#fff' }} onClick={()=>openDrawer('savings')}>+ Add Savings Goal</Button>
                      </div>
                    </Card>

                    <Row gutter={[14,14]}>
                      <Col xs={24} sm={12} lg={8} xl={4}><Card className="soft-card kpi balance"><Statistic title="Total Balance" value={totals.balance} suffix="MAD" /></Card></Col>
                      <Col xs={24} sm={12} lg={8} xl={4}><Card className="soft-card kpi income"><Statistic title="Total Income" value={totals.income} suffix="MAD" /></Card></Col>
                      <Col xs={24} sm={12} lg={8} xl={4}><Card className="soft-card kpi expense"><Statistic title="Total Expenses" value={totals.expenses} suffix="MAD" /></Card></Col>
                      <Col xs={24} sm={12} lg={8} xl={4}><Card className="soft-card kpi invest"><Statistic title="Total Investments" value={totals.investments} suffix="MAD" /></Card></Col>
                      <Col xs={24} sm={12} lg={8} xl={4}><Card className="soft-card kpi saving"><Statistic title="Total Savings" value={totals.savings} suffix="MAD" /></Card></Col>
                    </Row>

                    <Row gutter={[14,14]}>
                      <Col xs={24} lg={12}><Card className="soft-card" title="Income by Source"><ChartCard title="Income by Source" labels={bySource.map(x=>x.label)} data={bySource.map(x=>x.value)} /></Card></Col>
                      <Col xs={24} lg={12}><Card className="soft-card" title="Expenses by Category"><ChartCard title="Expenses by Category" labels={byCategory.map(x=>x.label)} data={byCategory.map(x=>x.value)} /></Card></Col>
                      <Col xs={24} lg={12}><Card className="soft-card" title="Monthly Cash Flow"><ChartCard type="line" title="Monthly Cash Flow" labels={monthly.map(x=>x.month)} data={monthly.map(x=>x.income - x.expense - x.invest)} /></Card></Col>
                      <Col xs={24} lg={12}><Card className="soft-card" title="Income vs Expenses"><ChartCard type="bar" title="Income vs Expenses" labels={monthly.map(x=>x.month)} data={monthly.map(x=>x.income - x.expense)} /></Card></Col>
                    </Row>

                    <Row gutter={[14,14]}>
                      <Col xs={24} lg={14}>
                        <Card className="soft-card" title="Latest Transactions">
                          <Table
                            rowKey="id"
                            pagination={false}
                            dataSource={[...db.incomes.map(x=>({...x, kind:'Income'})), ...db.expenses.map(x=>({...x, kind:'Expense'})), ...db.investments.map(x=>({...x, kind:'Investment'}))].sort((a,b)=>dayjs(b.date).unix()-dayjs(a.date).unix()).slice(0,8)}
                            columns={[
                              { title:'Type', dataIndex:'kind', render:(k)=><Tag color={k==='Income'?'green':k==='Expense'?'red':'purple'}>{k}</Tag> },
                              { title:'Amount', dataIndex:'amount', render:money },
                              { title:'Date', dataIndex:'date' },
                              { title:'Details', render:(_,r)=>r.source || r.category || r.businessName }
                            ]}
                          />
                        </Card>
                      </Col>
                      <Col xs={24} lg={10}>
                        <Card className="soft-card" title="Savings Goals Progress">
                          <Space direction="vertical" style={{ width:'100%' }}>
                            {db.savingsGoals.map(g => {
                              const pct = Math.min(100, (Number(g.currentAmount)/Number(g.targetAmount))*100 || 0);
                              return <div key={g.id}><Text strong>{g.name}</Text><Progress percent={Number(pct.toFixed(1))} strokeColor="#0ea5e9" /><Text type="secondary">{money(g.currentAmount)} / {money(g.targetAmount)} · deadline {g.deadline}</Text></div>;
                            })}
                          </Space>
                        </Card>
                      </Col>
                    </Row>

                    <Card className="soft-card" title="Financial Insights">
                      <Space direction="vertical" style={{ width:'100%' }}>
                        {insights.map(item => <Alert key={item} type="info" showIcon message={item} />)}
                      </Space>
                    </Card>

                    <MonthlyPlanner db={db} save={save} />
                  </Space>
                )}

                {['income','expenses','investments','savings'].includes(page) && <Module page={page} db={db} openDrawer={openDrawer} removeRecord={removeRecord} save={save} />}
                {page==='reports' && <Reports db={db} monthly={monthly} bySource={bySource} byCategory={byCategory} />}
                {page==='settings' && <Card className="soft-card" title="Settings"><Text>Data persists in localStorage. Use browser storage clear to reset.</Text></Card>}
              </Content>
            </Layout>

            <RecordDrawer
              drawer={drawer}
              onClose={()=>setDrawer({ open:false, type:null, record:null })}
              onSubmit={(type, values)=>{
                const key = keyMap[type];
                const normalized = {
                  ...values,
                  id: drawer.record?.id || uid(),
                  date: values.date ? dayjs(values.date).format('YYYY-MM-DD') : undefined,
                  deadline: values.deadline ? dayjs(values.deadline).format('YYYY-MM-DD') : undefined,
                };
                save({ ...db, [key]: drawer.record ? db[key].map(x=>x.id===drawer.record.id ? normalized : x) : [...db[key], normalized] });
                setDrawer({ open:false, type:null, record:null });
              }}
            />
          </Layout>
        );
      }

      function Module({ page, db, openDrawer, removeRecord, save }) {
        const [filter, setFilter] = React.useState();
        const config = {
          income: { key:'incomes', title:'Income Sources', color:'#059669' },
          expenses: { key:'expenses', title:'Expenses', color:'#dc2626' },
          investments: { key:'investments', title:'Business Investments', color:'#7c3aed' },
          savings: { key:'savingsGoals', title:'Savings Goals', color:'#0ea5e9' },
        }[page];

        const rows = db[config.key].filter(r => !filter || (page==='income' ? r.source===filter : page==='expenses' ? r.category===filter : true));

        const columns = {
          income:[{title:'Amount',dataIndex:'amount',render:money},{title:'Source',dataIndex:'source'},{title:'Date',dataIndex:'date'},{title:'Description',dataIndex:'description'},{title:'Tag',dataIndex:'tag'}],
          expenses:[{title:'Amount',dataIndex:'amount',render:money},{title:'Category',dataIndex:'category'},{title:'Date',dataIndex:'date'},{title:'Payment method',dataIndex:'paymentMethod'},{title:'Notes',dataIndex:'notes'}],
          investments:[{title:'Amount',dataIndex:'amount',render:money},{title:'Business',dataIndex:'businessName'},{title:'Type',dataIndex:'investmentType'},{title:'Date',dataIndex:'date'},{title:'Description',dataIndex:'notes'}],
          savings:[{title:'Goal',dataIndex:'name'},{title:'Target',dataIndex:'targetAmount',render:money},{title:'Current',dataIndex:'currentAmount',render:money},{title:'Deadline',dataIndex:'deadline'},{title:'Progress',render:(_,r)=><Progress percent={Number(((r.currentAmount/r.targetAmount)*100||0).toFixed(1))} strokeColor="#0ea5e9" />}]
        }[page];

        return (
          <Card className="soft-card" title={<Text style={{ color: config.color }}>{config.title}</Text>} extra={<Button type="primary" onClick={()=>openDrawer(page)}>Add</Button>}>
            <div className="section-sub">Prioritized workflow: fill required fields first in drawer, then optional notes.</div>
            {page==='income' && <Select allowClear placeholder="Filter by source" style={{ width: 220, marginBottom: 12 }} options={incomeSources.map(v=>({ value:v }))} onChange={setFilter} />}
            {page==='expenses' && <Select allowClear placeholder="Filter by category" style={{ width: 220, marginBottom: 12 }} options={expenseCategories.map(v=>({ value:v }))} onChange={setFilter} />}
            <Table rowKey="id" dataSource={rows} columns={[...columns,{title:'Actions',render:(_,r)=><Space><Button size="small" onClick={()=>openDrawer(page,r)}>Edit</Button>{page==='savings'&&<Button type="primary" size="small" onClick={()=>save({...db,savingsGoals:db.savingsGoals.map(g=>g.id===r.id?{...g,currentAmount:Number(g.currentAmount)+100}:g)})}>+100 MAD</Button>}<Button danger size="small" onClick={()=>removeRecord(config.key,r.id)}>Delete</Button></Space>}]} />
          </Card>
        );
      }

      function MonthlyPlanner({ db, save }) {
        const [selectedMonth, setSelectedMonth] = React.useState(dayjs().format('YYYY-MM'));
        const [itemName, setItemName] = React.useState('');
        const [itemAmount, setItemAmount] = React.useState(0);
        const plan = db.monthlyPlans?.[selectedMonth] || { incomeNote:'', spendNote:'', spendItems:[] };

        const updatePlan = (patch) => save({ ...db, monthlyPlans: { ...(db.monthlyPlans || {}), [selectedMonth]: { ...plan, ...patch } } });
        const addItem = () => {
          if (!itemName.trim() || !Number(itemAmount)) return;
          updatePlan({ spendItems:[...(plan.spendItems || []), { id: uid(), name:itemName.trim(), amount:Number(itemAmount) }] });
          setItemName('');
          setItemAmount(0);
        };

        return (
          <Card className="soft-card" title="Monthly Planner">
            <div className="section-sub">Structured planning: month -> income note -> spend note -> spend items list.</div>
            <Space direction="vertical" size="middle" style={{ width:'100%' }}>
              <DatePicker picker="month" value={dayjs(`${selectedMonth}-01`)} onChange={(v)=>setSelectedMonth(v ? dayjs(v).format('YYYY-MM') : dayjs().format('YYYY-MM'))} />
              <Row gutter={[12,12]}>
                <Col xs={24} md={12}><Text strong>Income plan</Text><TextArea rows={4} value={plan.incomeNote || ''} onChange={(e)=>updatePlan({ incomeNote:e.target.value })} placeholder="Expected income details" /></Col>
                <Col xs={24} md={12}><Text strong>Spend plan</Text><TextArea rows={4} value={plan.spendNote || ''} onChange={(e)=>updatePlan({ spendNote:e.target.value })} placeholder="Budget notes and priorities" /></Col>
              </Row>
              <Card size="small" title="Spend items">
                <Space wrap>
                  <Input placeholder="Item name" value={itemName} onChange={(e)=>setItemName(e.target.value)} style={{ width: 220 }} />
                  <InputNumber min={0} placeholder="Amount" value={itemAmount} onChange={(v)=>setItemAmount(v||0)} />
                  <Button type="primary" onClick={addItem}>Add item</Button>
                </Space>
                <Table style={{ marginTop: 12 }} rowKey="id" pagination={false} dataSource={plan.spendItems || []} columns={[
                  { title:'Item', dataIndex:'name' },
                  { title:'Amount', dataIndex:'amount', render:money },
                  { title:'Action', render:(_,row)=><Button danger size="small" onClick={()=>updatePlan({ spendItems:(plan.spendItems || []).filter(x=>x.id!==row.id) })}>Remove</Button> }
                ]} />
                <Text type="secondary">Total planned spend items: {money(sum(plan.spendItems || []))}</Text>
              </Card>
            </Space>
          </Card>
        );
      }

      function Reports({ db, monthly, bySource, byCategory }) {
        const [f,setF] = React.useState({ month:null, year:null });
        const filteredInvestments = db.investments.filter(i => (!f.month || dayjs(i.date).month()===Number(f.month)) && (!f.year || dayjs(i.date).year()===Number(f.year)));
        return (
          <Card className="soft-card" title="Reports & Analytics">
            <Space wrap style={{ marginBottom: 14 }}>
              <Select allowClear placeholder="Month" style={{ width:120 }} options={Array.from({length:12},(_,i)=>({ label:i+1, value:i }))} onChange={(month)=>setF(s=>({ ...s, month }))} />
              <Select allowClear placeholder="Year" style={{ width:120 }} options={[2024,2025,2026,2027].map(y=>({ value:y }))} onChange={(year)=>setF(s=>({ ...s, year }))} />
            </Space>
            <Tabs items={[
              { key:'m', label:'Monthly Summary', children:<ChartCard type="line" title="Monthly Summary" labels={monthly.map(x=>x.month)} data={monthly.map(x=>x.income-x.expense-x.invest)} /> },
              { key:'i', label:'Income per Source', children:<ChartCard title="Income per Source" labels={bySource.map(x=>x.label)} data={bySource.map(x=>x.value)} /> },
              { key:'e', label:'Expense per Category', children:<ChartCard title="Expense per Category" labels={byCategory.map(x=>x.label)} data={byCategory.map(x=>x.value)} /> },
              { key:'g', label:'Investment Growth', children:<ChartCard type="bar" title="Investment Growth" labels={filteredInvestments.map(x=>x.date)} data={filteredInvestments.map(x=>x.amount)} /> },
              { key:'s', label:'Savings Progress', children:<ChartCard type="bar" title="Savings Progress" labels={db.savingsGoals.map(x=>x.name)} data={db.savingsGoals.map(x=>((x.currentAmount/x.targetAmount)*100||0).toFixed(1))} /> },
            ]} />
          </Card>
        );
      }

      function RecordDrawer({ drawer, onClose, onSubmit }) {
        const [form] = Form.useForm();
        const { open, type, record } = drawer;

        React.useEffect(() => {
          if (!open) { form.resetFields(); return; }
          const next = { ...record };
          if (next?.date) next.date = dayjs(next.date);
          if (next?.deadline) next.deadline = dayjs(next.deadline);
          form.setFieldsValue(next || {});
        }, [open, record]);

        const first = {
          income: [
            <Form.Item key="amount" name="amount" label="Amount" rules={[{required:true}]}><InputNumber style={{ width:'100%' }} /></Form.Item>,
            <Form.Item key="source" name="source" label="Source" rules={[{required:true}]}><Select options={incomeSources.map(v=>({ value:v }))} /></Form.Item>,
            <Form.Item key="date" name="date" label="Date" rules={[{required:true}]}><DatePicker style={{ width:'100%' }} /></Form.Item>,
          ],
          expenses: [
            <Form.Item key="amount" name="amount" label="Amount" rules={[{required:true}]}><InputNumber style={{ width:'100%' }} /></Form.Item>,
            <Form.Item key="category" name="category" label="Category" rules={[{required:true}]}><Select options={expenseCategories.map(v=>({ value:v }))} /></Form.Item>,
            <Form.Item key="date" name="date" label="Date" rules={[{required:true}]}><DatePicker style={{ width:'100%' }} /></Form.Item>,
          ],
          investments: [
            <Form.Item key="amount" name="amount" label="Amount" rules={[{required:true}]}><InputNumber style={{ width:'100%' }} /></Form.Item>,
            <Form.Item key="businessName" name="businessName" label="Business Name" rules={[{required:true}]}><Input /></Form.Item>,
            <Form.Item key="investmentType" name="investmentType" label="Investment Type" rules={[{required:true}]}><Select options={investmentTypes.map(v=>({ value:v }))} /></Form.Item>,
            <Form.Item key="date" name="date" label="Date" rules={[{required:true}]}><DatePicker style={{ width:'100%' }} /></Form.Item>,
          ],
          savings: [
            <Form.Item key="name" name="name" label="Goal Name" rules={[{required:true}]}><Input /></Form.Item>,
            <Form.Item key="targetAmount" name="targetAmount" label="Target Amount" rules={[{required:true}]}><InputNumber style={{ width:'100%' }} /></Form.Item>,
            <Form.Item key="currentAmount" name="currentAmount" label="Current Saved" rules={[{required:true}]}><InputNumber style={{ width:'100%' }} /></Form.Item>,
            <Form.Item key="deadline" name="deadline" label="Deadline" rules={[{required:true}]}><DatePicker style={{ width:'100%' }} /></Form.Item>,
          ]
        };

        const secondary = {
          income: [<Form.Item key="description" name="description" label="Description"><Input /></Form.Item>, <Form.Item key="tag" name="tag" label="Tag"><Input /></Form.Item>],
          expenses: [<Form.Item key="paymentMethod" name="paymentMethod" label="Payment Method"><Input /></Form.Item>, <Form.Item key="notes" name="notes" label="Notes"><Input /></Form.Item>],
          investments: [<Form.Item key="notes" name="notes" label="Description"><Input /></Form.Item>],
          savings: []
        };

        return (
          <Drawer
            width={440}
            open={open}
            onClose={onClose}
            title={`${record ? 'Edit' : 'Add'} ${type || ''}`}
            extra={<Button type="primary" onClick={()=>form.validateFields().then(v=>onSubmit(type,v))}>Save</Button>}
          >
            <div className="section-title">Step 1 — Required fields first</div>
            <div className="section-sub">This prioritizes critical data entry before optional details.</div>
            <Form form={form} layout="vertical">
              {type ? first[type] : null}
              <Divider />
              <div className="section-title">Step 2 — Optional details</div>
              <div className="section-sub">Enhance quality with notes/tags if needed.</div>
              {type ? secondary[type] : null}
            </Form>
          </Drawer>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
